worker_processes 1;

events {
    worker_connections 128;
}

http {
    # Allow large request bodies (e.g. Node-RED flow deployments)
    client_max_body_size 50m;

    # WebSocket upgrade mapping
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    upstream ha {
        server 127.0.0.1:8123;
    }

    upstream hue {
        server 127.0.0.1:8300;
    }

    server {
        listen 80;

        # =====================================================================
        # Hue bridge (emulated_hue) routes — only these specific paths
        # =====================================================================

        # Bridge description XML — Alexa discovers the bridge here
        location = /description.xml {
            proxy_pass http://hue;
        }

        # Hue user-registration endpoint: exact match on /api (no trailing /)
        # The Hue protocol POSTs to /api to create a "username" (API key).
        location = /api {
            proxy_pass http://hue;
        }

        # Hue API: /api/<username>/... (username is a long alphanumeric string)
        # This matches the Hue protocol paths without catching HA's /api/...
        # HA paths like /api/websocket (9), /api/states (6) are all < 10 chars
        location ~ "^/api/[0-9a-zA-Z][0-9a-zA-Z][0-9a-zA-Z][0-9a-zA-Z][0-9a-zA-Z][0-9a-zA-Z][0-9a-zA-Z][0-9a-zA-Z][0-9a-zA-Z][0-9a-zA-Z]" {
            proxy_pass http://hue;
        }

        # =====================================================================
        # Everything else → Home Assistant
        # =====================================================================

        # HA WebSocket
        location /api/websocket {
            proxy_pass http://ha;
            proxy_http_version 1.1;
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host       $host;
        }

        # All other requests (frontend, static, REST API, etc.)
        location / {
            proxy_pass http://ha;
            proxy_http_version 1.1;
            proxy_set_header Upgrade            $http_upgrade;
            proxy_set_header Connection          $connection_upgrade;
            proxy_set_header Host                $host;
            proxy_set_header X-Real-IP           $remote_addr;
            proxy_set_header X-Forwarded-For     $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto   $scheme;
        }
    }
}
